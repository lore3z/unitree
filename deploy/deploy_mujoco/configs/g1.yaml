# 
policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/g1/exported/policies/policy_lstm_1.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/g1_description/scene.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.005
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 4

kps: [100, 100, 100, 150, 40, 40, 100, 100, 100, 150, 40, 40]
kds: [2, 2, 2, 4, 2, 2, 2, 2, 2, 4, 2, 2]

default_angles: [-0.1,  0.0,  0.0,  0.3, -0.2, 0.0, 
                  -0.1,  0.0,  0.0,  0.3, -0.2, 0.0]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
num_obs: 47

cmd_init: [1, 0, 0]

# External disturbance settings (for Mujoco deploy)
push_robots: true        # 是否启用随机外力干扰
push_interval_s: 5.0     # 两次外力之间的时间间隔（秒）
push_duration_s: 0.05    # 单次外力持续时间（秒）
max_push_force_xy: 120.0 # x/y 方向随机外力上限（N）
max_push_force_z: 0.0    # z 方向外力上限（N）
push_body_name: pelvis   # 施加外力的 body 名称